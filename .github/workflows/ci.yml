name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool: [weather-api, perplexity-search, file-converter, talk-to-agent]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t ${{ matrix.tool }} tools/${{ matrix.tool }}
