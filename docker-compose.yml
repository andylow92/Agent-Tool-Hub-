services:
  weather-api:
    build: tools/weather-api
    ports:
      - "8001:8001"
    env_file:
      - tools/weather-api/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  perplexity-search:
